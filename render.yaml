# Render Blueprint: https://render.com/docs/blueprint-spec
databases:
  - name: ipl-auction-db
    plan: free
    databaseName: ipl_auction
    user: ipl_auction

services:
  - type: web
    name: ipl-auction
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix client --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/state
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ipl-auction-db
          property: connectionString
