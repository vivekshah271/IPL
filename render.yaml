# Render Blueprint: https://render.com/docs/blueprint-spec
# Set DATABASE_URL in the dashboard to your Neon Postgres connection string.
services:
  - type: web
    name: ipl-auction
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix client --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/state
    envVars:
      - key: NODE_ENV
        value: production
      - key: ROOM_CODE
        value: IPL2026
      - key: TRADE_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
